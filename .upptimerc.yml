owner: Kyzen-AI # GitHub organization where this repository lives
repo: kyzen-status # The name of this repository

sites:
  - name: Kyzen App
    url: https://app.kyzen.ai

status-website:
  # No custom domain yet — the site is served at
  # https://kyzen-ai.github.io/kyzen-status, so baseUrl must be the repo name.
  # To use a custom domain later (e.g. status.kyzen.ai), remove `baseUrl`,
  # add `cname: status.kyzen.ai`, and point a DNS CNAME at kyzen-ai.github.io.
  baseUrl: /kyzen-status
  name: Kyzen Status
  introTitle: "**Kyzen** service status"
  introMessage: Live and historical availability of Kyzen's public services. Powered by [Upptime](https://upptime.js.org) — monitored externally from GitHub, independent of Kyzen's own infrastructure.
  navbar:
    - title: Status
      href: /
