owner: Kyzen-AI # GitHub organization where this repository lives
repo: kyzen-status # The name of this repository

sites:
  - name: Kyzen App
    url: https://app.kyzen.ai

status-website:
  # Custom domain. Requires a DNS CNAME: status.kyzen.ai -> kyzen-ai.github.io
  # (Upptime writes the gh-pages CNAME file, which sets the Pages custom domain).
  cname: status.kyzen.ai
  name: Kyzen Status
  introTitle: "**Kyzen** service status"
  introMessage: Live and historical availability of Kyzen's public services. Independently monitored from outside Kyzen's own infrastructure.
  navbar:
    - title: Status
      href: /
  # Hide the hardcoded "This page is open source, powered by Upptime" footer.
  css: |
    footer { display: none !important; }
